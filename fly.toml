app = "bizcorev2"
primary_region = "ams"

[build]
  # For Python/FastAPI without Dockerfile
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[vm]]
  memory = "256mb"
  cpus = 1
  cpu_kind = "shared"
