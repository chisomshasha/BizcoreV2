app = "bizcore-v2"                    # ← CHANGE this to something unique and lowercase (hyphens allowed)
primary_region = "ams"                # ← Change to your closest region (ams, ord, fra, syd, etc.)

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8080                # Must match what your CMD listens on
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health check
  [[services.http_checks]]
    interval = "30s"
    grace_period = "30s"
    method = "get"
    path = "/"                        # Change if your root endpoint is different (e.g. /health)
    protocol = "http"
    timeout = "10s"
