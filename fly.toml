# fly.toml app configuration file generated for bizcorev2 on 2026-04-15T13:35:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bizcorev2'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

  [[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Improved health check for FastAPI (gives more time to start)
  [[services.http_checks]]
    interval = "30s"
    grace_period = "60s"          # Increased from 30s → very important for startup
    method = "get"
    path = "/"                    # Change to "/docs" or "/health" if your root returns error
    protocol = "http"
    timeout = "10s"
    tls_skip_verify = false
